name: Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        agent: [claude, opencode, codex]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker
          build-args: AGENT=${{ matrix.agent }}
          push: true
          tags: ghcr.io/ralphai/sandbox:${{ matrix.agent }}
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}

      - name: Smoke test — verify agent CLI is executable
        run: |
          docker run --rm ghcr.io/ralphai/sandbox:${{ matrix.agent }} \
            sh -c "
              git --version && \
              node --version && \
              bun --version && \
              ${{ matrix.agent }} --version
            "
