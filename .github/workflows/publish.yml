name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm type-check

      - name: Tests
        timeout-minutes: 10
        run: pnpm test

      - name: Determine version bump
        id: version
        run: |
          # Tag push → skip bump
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "bump=skip" >> $GITHUB_OUTPUT
            echo "Tag push - skipping version bump, will publish directly"
            exit 0
          fi

          # Manual trigger → use input bump
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> $GITHUB_OUTPUT
            echo "Manual trigger - will bump ${{ inputs.bump }} version"
            exit 0
          fi

          # Commits since last tag → auto bump
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --format=%s)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --format=%s)
          fi

          if echo "$COMMITS" | grep -q "\[minor\]"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "Found [minor] - will bump minor version"
          elif echo "$COMMITS" | grep -q "\[patch\]"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Found [patch] - will bump patch version"
          else
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "No version marker found - skipping release"
          fi

      - name: Bump version (local only)
        if: steps.version.outputs.bump != 'none' && steps.version.outputs.bump != 'skip'
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version
          echo "Bumped package.json version locally"

      - name: Publish to npm
        if: steps.version.outputs.bump != 'none'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.bump != 'none' || steps.version.outputs.bump == 'skip'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Extract the current version's section from CHANGELOG.md
          # Matches from "## <version>" until the next "## " heading or end of file
          NOTES=$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              # Match "## 0.3.0" or "## 0.3.0 — suffix"
              split($0, a, " "); gsub(/—.*/, "", a[2])
              if (a[2] == ver) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md section found for version ${VERSION}, falling back to --generate-notes"
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          else
            echo "$NOTES" | gh release create "v${VERSION}" --title "v${VERSION}" --notes-file -
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
